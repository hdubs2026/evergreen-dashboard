<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evergreen Landscaping - Sales Funnel Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --awareness: #3498db;
            --interest: #9b59b6;
            --consideration: #2ecc71;
            --intent: #f39c12;
            --evaluation: #e74c3c;
            --purchase: #27ae60;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --gray: #95a5a6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--dark), #34495e);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(44, 62, 80, 0.8);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo i {
            color: var(--purchase);
            font-size: 2.5rem;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--awareness), var(--purchase));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--gray);
            font-size: 1.2rem;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            text-decoration: none;
            color: white;
        }

        .btn-primary {
            background: var(--purchase);
        }

        .btn-secondary {
            background: var(--dark);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(44, 62, 80, 0.8);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(46, 204, 113, 0.3);
        }

        .card-title {
            font-size: 1.5rem;
            color: var(--light);
        }

        .card-title i {
            margin-right: 10px;
        }

        /* Funnel Visualization */
        .funnel-container {
            grid-column: span 2;
        }

        .funnel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 30px 0;
        }

        .funnel-stage {
            width: 100%;
            padding: 20px;
            border-radius: 10px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .funnel-stage:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
        }

        .funnel-stage::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
        }

        .funnel-stage:hover::before {
            animation: shimmer 2s infinite;
        }

        .stage-1 { background: var(--awareness); width: 100%; }
        .stage-2 { background: var(--interest); width: 85%; }
        .stage-3 { background: var(--consideration); width: 70%; }
        .stage-4 { background: var(--intent); width: 55%; }
        .stage-5 { background: var(--evaluation); width: 40%; }
        .stage-6 { background: var(--purchase); width: 25%; }

        .stage-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stage-icon {
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage-details h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .stage-details p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .stage-stats {
            text-align: right;
        }

        .stage-count {
            font-size: 2rem;
            font-weight: bold;
        }

        .stage-conversion {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Charts */
        .chart-container {
            height: 300px;
            position: relative;
        }

        /* Lead List */
        .lead-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .lead-item {
            background: rgba(52, 73, 94, 0.6);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid;
            animation: fadeIn 0.5s ease;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lead-item:hover {
            transform: translateX(5px);
            background: rgba(52, 73, 94, 0.8);
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .lead-name {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .lead-stage {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
        }

        .lead-details {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--gray);
        }

        .lead-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .action-btn {
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .metric-card {
            background: rgba(52, 152, 219, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(52, 152, 219, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--purchase);
            margin: 10px 0;
        }

        .metric-label {
            color: var(--gray);
            font-size: 0.9rem;
        }

        /* Quick Actions */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .action-card {
            background: rgba(46, 204, 113, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(46, 204, 113, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-card:hover {
            background: rgba(46, 204, 113, 0.2);
            transform: scale(1.05);
        }

        .action-icon {
            font-size: 2rem;
            color: var(--purchase);
            margin-bottom: 10px;
        }

        .action-text {
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--dark);
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--light);
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--gray);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--gray);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
            font-size: 1rem;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: var(--purchase);
            color: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 1001;
            animation: slideIn 0.3s ease;
            display: none;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: var(--gray);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .funnel-container {
                grid-column: span 1;
            }
            
            .funnel-stage {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            
            .stage-stats {
                text-align: center;
            }
            
            .nav-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-funnel-dollar"></i>
                <h1>Sales Funnel Dashboard</h1>
                <i class="fas fa-chart-line"></i>
            </div>
            <p class="subtitle">Track leads, conversions, and revenue in real-time</p>
            
            <div class="nav-buttons">
                <a href="index.html" class="btn btn-secondary">
                    <i class="fas fa-home"></i> Back to Main Dashboard
                </a>
                <button class="btn btn-primary" id="add-lead-btn">
                    <i class="fas fa-plus"></i> Add New Lead
                </button>
                <button class="btn btn-primary" id="refresh-btn">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
                <button class="btn btn-primary" id="export-btn">
                    <i class="fas fa-download"></i> Export Report
                </button>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Funnel Visualization -->
            <div class="card funnel-container">
                <div class="card-header">
                    <h2 class="card-title"><i class="fas fa-filter"></i> Sales Funnel</h2>
                    <span class="update-info">Total Leads: <span id="total-leads">152</span></span>
                </div>
                <div class="funnel">
                    <div class="funnel-stage stage-1" data-stage="awareness">
                        <div class="stage-info">
                            <div class="stage-icon">
                                <i class="fas fa-eye"></i>
                            </div>
                            <div class="stage-details">
                                <h3>Awareness</h3>
                                <p>Website visitors, social media reach</p>
                            </div>
                        </div>
                        <div class="stage-stats">
                            <div class="stage-count" id="awareness-count">1,250</div>
                            <div class="stage-conversion">100%</div>
                        </div>
                    </div>
                    
                    <div class="funnel-stage stage-2" data-stage="interest">
                        <div class="stage-info">
                            <div class="stage-icon">
                                <i class="fas fa-heart"></i>
                            </div>
                            <div class="stage-details">
                                <h3>Interest</h3>
                                <p>Content engagement, email opens</p>
                            </div>
                        </div>
                        <div class="stage-stats">
                            <div class="stage-count" id="interest-count">312</div>
                            <div class="stage-conversion">25%</div>
                        </div>
                    </div>
                    
                    <div class="funnel-stage stage-3" data-stage="consideration">
                        <div class="stage-info">
                            <div class="stage-icon">
                                <i class="fas fa
