<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Mission Control Buttons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #2c3e50;
            color: white;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #2980b9;
        }
        #log {
            background: #34495e;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            min-height: 100px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Test Mission Control Buttons</h1>
    <p>Click buttons to test functionality:</p>
    
    <div class="buttons">
        <button id="animate-btn">Animate Agents</button>
        <button id="reset-btn">Reset Agents</button>
        <button id="activity-btn">Add Activity</button>
        <button id="clear-btn">Clear Activities</button>
    </div>
    
    <div id="log">Console log will appear here...</div>
    
    <script>
        // Get elements
        const animateBtn = document.getElementById('animate-btn');
        const resetBtn = document.getElementById('reset-btn');
        const activityBtn = document.getElementById('activity-btn');
        const clearBtn = document.getElementById('clear-btn');
        const log = document.getElementById('log');
        
        // Log function
        function addLog(message) {
            log.innerHTML += message + '<br>';
            log.scrollTop = log.scrollHeight;
        }
        
        // Button functions
        function moveAgents() {
            addLog('✅ Animate Agents clicked - Agents should move around office');
        }
        
        function resetAgents() {
            addLog('✅ Reset Agents clicked - Agents should return to desks');
        }
        
        function addRandomActivity() {
            addLog('✅ Add Activity clicked - Random activity should be added to feed');
        }
        
        function clearActivities() {
            addLog('✅ Clear Activities clicked - Activity feed should be cleared');
            log.innerHTML = 'Console log will appear here...<br>';
        }
        
        // Add event listeners
        animateBtn.addEventListener('click', moveAgents);
        resetBtn.addEventListener('click', resetAgents);
        activityBtn.addEventListener('click', addRandomActivity);
        clearBtn.addEventListener('click', clearActivities);
        
        addLog('✅ Event listeners added successfully!');
        addLog('Click any button to test functionality...');
    </script>
</body>
</html>
