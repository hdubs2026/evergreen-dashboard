<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evergreen Landscaping AI Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #3498db;
            --accent: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --wood: #d4a574;
            --desk: #8b4513;
            --jordan: linear-gradient(135deg, #3498db, #2980b9);
            --donna: linear-gradient(135deg, #9b59b6, #8e44ad);
            --jerry: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--dark), #34495e);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(44, 62, 80, 0.8);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo i {
            color: var(--primary);
            font-size: 2.5rem;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #95a5a6;
            font-size: 1.2rem;
        }

        .time-display {
            font-size: 1.3rem;
            margin-top: 10px;
            padding: 10px;
            background: rgba(52, 152, 219, 0.2);
            border-radius: 10px;
            display: inline-block;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(44, 62, 80, 0.8);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(46, 204, 113, 0.3);
        }

        .card-title {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .card-title i {
            margin-right: 10px;
        }

        /* Office Section */
        .office-container {
            grid-column: span 2;
        }

        .office-floor {
            background: var(--wood);
            height: 400px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid var(--desk);
        }

        .desk {
            position: absolute;
            width: 120px;
            height: 60px;
            background: var(--desk);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .desk-1 { top: 50px; left: 100px; }
        .desk-2 { top: 50px; right: 100px; }
        .desk-3 { bottom: 50px; left: 50%; transform: translateX(-50%); }

        .agent {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            transition: all 0.5s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .agent.jordan { background: var(--jordan); }
        .agent.donna { background: var(--donna); }
        .agent.jerry { background: var(--jerry); }

        .agent:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .office-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-accent {
            background: var(--accent);
            color: white;
        }

        .btn-dark {
            background: var(--dark);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Activity Feed */
        .activity-feed {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .activity-item {
            background: rgba(52, 73, 94, 0.6);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            animation: fadeIn 0.5s ease;
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .activity-agent {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .activity-time {
            color: #95a5a6;
            font-size: 0.9rem;
        }

        .activity-content {
            color: #ecf0f1;
        }

        /* Metrics Dashboard */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .metric-card {
            background: rgba(52, 152, 219, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0;
        }

        .metric-label {
            color: #95a5a6;
            font-size: 0.9rem;
        }

        /* Progress Tracking */
        .phase {
            margin-bottom: 25px;
        }

        .phase-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .phase-name {
            font-weight: bold;
            color: var(--light);
        }

        .phase-percent {
            color: var(--primary);
            font-weight: bold;
        }

        .progress-bar {
            height: 20px;
            background: rgba(52, 73, 94, 0.6);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 1s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shimmer 2s infinite;
        }

        /* Agent Details */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .agent-card {
            background: rgba(52, 73, 94, 0.6);
            padding: 20px;
            border-radius: 10px;
            border-top: 4px solid;
        }

        .agent-card.jordan { border-color: #3498db; }
        .agent-card.donna { border-color: #9b59b6; }
        .agent-card.jerry { border-color: #e74c3c; }

        .agent-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .agent-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .agent-name {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .agent-role {
            color: #95a5a6;
            font-size: 0.9rem;
        }

        .agent-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #95a5a6;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #95a5a6;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shortcuts {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .shortcut {
            background: rgba(52, 73, 94, 0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .office-container {
                grid-column: span 1;
            }
            
            .office-floor {
                height: 300px;
            }
            
            .desk {
                width: 80px;
                height: 50px;
                font-size: 0.8rem;
            }
            
            .desk-1 { top: 30px; left: 30px; }
            .desk-2 { top: 30px; right: 30px; }
            .desk-3 { bottom: 30px; left: 50%; }
            
            .agent {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .agents-grid {
                grid-template-columns: 1fr;
            }
            
            .btn {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .metrics-grid {
                grid-template-columns: 1fr;
            }
            
            .office-controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-leaf"></i>
                <h1>Evergreen Landscaping AI Dashboard</h1>
                <i class="fas fa-robot"></i>
            </div>
            <p class="subtitle">Virtual Office Monitoring AI Agents in Real-Time</p>
            <div class="time-display">
                <i class="far fa-clock"></i>
                <span id="current-time">Loading...</span>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Virtual Office -->
            <div class="card office-container">
                <div class="card-header">
                    <h2 class="card-title"><i class="fas fa-building"></i> Virtual Office</h2>
                    <div class="office-controls">
                        <button class="btn btn-primary" id="animate-btn">
                            <i class="fas fa-running"></i> Animate Agents
                        </button>
                        <button class="btn btn-secondary" id="reset-btn">
                            <i class="fas fa-home"></i> Reset Positions
                        </button>
                        <button class="btn btn-accent" id="activity-btn">
                            <i class="fas fa-plus"></i> New Activity
                        </button>
                        <button class="btn btn-dark" id="clear-btn">
                            <i class="fas fa-trash"></i> Clear Feed
                        </button>
                    </div>
                </div>
                
                <div class="office-floor">
                    <div class="desk desk-1">Jordan's Desk</div>
                    <div class="desk desk-2">Donna's Desk</div>
                    <div class="desk desk-3">Jerry's Desk</div>
                    
                    <div class="agent jordan" id="agent-jordan" data-agent="jordan">
                        <i class="fas fa-chart-bar"></i>
                    </div>
                    <div class="agent donna" id="agent-donna" data-agent="donna">
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                    <div class="agent jerry" id="agent-jerry" data-agent="jerry">
                        <i class="fas fa-phone-alt"></i>
                    </div>
                </div>
                
                <p style="margin-top: 15px; color: #95a5a6; text-align: center;">
                    <i class="fas fa-info-circle"></i> Click on agents for details • Hover over desks for info
                </p>
            </div>

            <!-- Activity Feed -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title"><i class="fas fa-stream"></i> Live Activity Feed</h2
